name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout UniverseEngine
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with /engine/ base path
        run: npx vite build --base=/engine/

      - name: Checkout GitHub Pages repo
        uses: actions/checkout@v4
        with:
          repository: UniverseMakers/universemakers.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: pages-repo

      - name: Deploy built files to engine/ directory
        run: |
          rm -rf pages-repo/engine
          cp -r dist pages-repo/engine

      - name: Commit and push to Pages repo
        run: |
          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add engine/
          # Only commit if there are changes
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy UniverseEngine from ${{ github.sha }}"
          git push
