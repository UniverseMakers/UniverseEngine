<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .inner-glow-pulse {
            box-shadow: inset 0 0 15px rgba(123, 208, 255, 0.4);
        }
        .tron-gradient-bg {
            background: radial-gradient(circle at center, #1b1b1e 0%, #0e0e11 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-container-lowest text-on-surface font-body overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-black/80 backdrop-blur-lg text-[#7bd0ff] font-mono uppercase tracking-[0.2em] text-sm border-b border-[#7bd0ff]/40 shadow-[0_0_15px_rgba(123,208,255,0.3)] flex justify-between items-center px-6 h-16 w-full z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined cursor-pointer hover:bg-[#7bd0ff]/10 p-2 rounded transition-all">menu</span>
<span class="text-[#7bd0ff] font-bold tracking-tighter">TRON_OS_V2</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined cursor-pointer hover:bg-[#7bd0ff]/10 p-2 rounded transition-all">monitoring</span>
</div>
</header>
<!-- Background Simulation Visual (Obscured by Overlay) -->
<main class="h-screen w-full pt-16 pb-20 flex items-center justify-center">
<div class="relative w-full h-full opacity-20 grayscale scale-110">
<img alt="Simulation Background" class="w-full h-full object-cover" data-alt="Abstract cyberpunk grid with glowing blue lines and data particles" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDeTzOu4Z14xFMtFGD9L9VLQGVOZ5taXOt7mnuDVFN-NmtDRYkRcDoUbMOJFZGi50KMkJ0XnxnWmdkbB5-Xa2fV-fkwQz4WI5UCHOEbUhmUikwWbM2OH3k_uDiCBpikoX41KLhTqhK5o9bwXtrfNCKM7QYo0m33fwFmeFnClSArY2xACOy-3Vszp9SdFXd4stU61QQFspTZiCZYIO5gTdV2luc8BMhwtYLPHqr8b8bVyJcrrd_f6X9LFlOHFchO4cGyiB31nYkFVDQ"/>
</div>
</main>
<!-- CONFIGURATION OVERLAY (Full-screen Mobile) -->
<section class="fixed inset-0 z-[60] bg-black/95 backdrop-blur-2xl flex flex-col font-mono p-6 pt-20 border-r-2 border-[#7bd0ff]">
<!-- Header / Close -->
<div class="flex items-center justify-between mb-8 border-b border-[#7bd0ff] pb-4">
<h2 class="text-[#7bd0ff] text-xl font-black tracking-widest">CORE_COMMAND</h2>
<span class="material-symbols-outlined text-[#7bd0ff] cursor-pointer" onclick="window.history.back()">close</span>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto space-y-8 pb-12">
<!-- Scale Selection -->
<div class="space-y-3">
<label class="text-[#7bd0ff]/60 text-xs tracking-widest uppercase">SCALE_SELECT</label>
<div class="relative">
<select class="w-full bg-[#7bd0ff]/10 border border-[#7bd0ff]/40 text-[#7bd0ff] rounded-lg p-4 appearance-none focus:outline-none focus:ring-1 focus:ring-[#7bd0ff] transition-all">
<option>MACRO_COSMIC_V1</option>
<option>NEBULA_CLUSTER_X</option>
<option>QUANTUM_FIELD_01</option>
<option>GALACTIC_NUCLEUS</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-[#7bd0ff]">expand_more</span>
</div>
</div>
<!-- Parameters -->
<div class="space-y-6">
<h3 class="text-[#7bd0ff] text-sm font-bold tracking-[0.2em] border-l-4 border-[#7bd0ff] pl-3 uppercase">PARAMETERS</h3>
<!-- Parameter 1 -->
<div class="space-y-4">
<div class="flex justify-between items-end">
<label class="text-[#7bd0ff]/80 text-xs tracking-wider">PHOTON_DENSITY (ρ)</label>
<div class="bg-black border border-[#7bd0ff]/30 px-3 py-1 rounded text-[#7bd0ff] text-sm shadow-[inset_0_0_5px_rgba(123,208,255,0.2)]">
                            0.842
                        </div>
</div>
<div class="relative h-6 flex items-center">
<div class="absolute w-full h-0.5 bg-[#7bd0ff]/20"></div>
<div class="absolute w-3/4 h-0.5 bg-[#7bd0ff] shadow-[0_0_10px_rgba(123,208,255,0.8)]"></div>
<div class="absolute left-3/4 -translate-x-1/2 w-4 h-4 rounded-full bg-white border-2 border-[#7bd0ff] shadow-[0_0_15px_#7bd0ff]"></div>
</div>
</div>
<!-- Parameter 2 -->
<div class="space-y-4">
<div class="flex justify-between items-end">
<label class="text-[#7bd0ff]/80 text-xs tracking-wider">GRAVITY_CONSTANT (G)</label>
<div class="bg-black border border-[#7bd0ff]/30 px-3 py-1 rounded text-[#7bd0ff] text-sm shadow-[inset_0_0_5px_rgba(123,208,255,0.2)]">
                            6.674
                        </div>
</div>
<div class="relative h-6 flex items-center">
<div class="absolute w-full h-0.5 bg-[#7bd0ff]/20"></div>
<div class="absolute w-1/2 h-0.5 bg-[#7bd0ff] shadow-[0_0_10px_rgba(123,208,255,0.8)]"></div>
<div class="absolute left-1/2 -translate-x-1/2 w-4 h-4 rounded-full bg-white border-2 border-[#7bd0ff] shadow-[0_0_15px_#7bd0ff]"></div>
</div>
</div>
<!-- Parameter 3 -->
<div class="space-y-4">
<div class="flex justify-between items-end">
<label class="text-[#7bd0ff]/80 text-xs tracking-wider">ENTROPY_LIMIT (S)</label>
<div class="bg-black border border-[#7bd0ff]/30 px-3 py-1 rounded text-[#7bd0ff] text-sm shadow-[inset_0_0_5px_rgba(123,208,255,0.2)]">
                            12.00
                        </div>
</div>
<div class="relative h-6 flex items-center">
<div class="absolute w-full h-0.5 bg-[#7bd0ff]/20"></div>
<div class="absolute w-full h-0.5 bg-[#7bd0ff] shadow-[0_0_10px_rgba(123,208,255,0.8)]"></div>
<div class="absolute left-full -translate-x-full w-4 h-4 rounded-full bg-white border-2 border-[#7bd0ff] shadow-[0_0_15px_#7bd0ff]"></div>
</div>
</div>
</div>
<!-- Additional Actions -->
<div class="grid grid-cols-2 gap-4 mt-4">
<button class="flex items-center justify-center gap-2 border border-[#7bd0ff]/40 bg-[#7bd0ff]/5 p-4 rounded-lg text-[#7bd0ff] text-xs font-bold tracking-widest hover:bg-[#7bd0ff]/20 transition-all uppercase">
<span class="material-symbols-outlined text-sm">settings</span>
                    Settings
                </button>
<button class="flex items-center justify-center gap-2 border border-[#7bd0ff]/40 bg-[#7bd0ff]/5 p-4 rounded-lg text-[#7bd0ff] text-xs font-bold tracking-widest hover:bg-[#7bd0ff]/20 transition-all uppercase">
<span class="material-symbols-outlined text-sm">terminal</span>
                    Console
                </button>
</div>
</div>
<!-- Run Action -->
<div class="pt-6 border-t border-[#7bd0ff]/20">
<button class="w-full bg-[#7bd0ff] text-black py-5 rounded-xl font-black text-lg tracking-[0.3em] shadow-[0_0_30px_rgba(123,208,255,0.6)] active:scale-95 transition-all flex items-center justify-center gap-3 uppercase">
<span class="material-symbols-outlined font-bold">rocket_launch</span>
                RUN_SIMULATION
            </button>
</div>
</section>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 bg-black/60 backdrop-blur-xl h-20 rounded-t-xl border-t-2 border-[#7bd0ff]/80 shadow-[0_-4px_20px_rgba(123,208,255,0.2)]">
<a class="flex flex-col items-center justify-center text-[#7bd0ff]/40 p-3 hover:text-white transition-all" href="#">
<span class="material-symbols-outlined">play_arrow</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#7bd0ff]/20 text-[#7bd0ff] rounded-lg p-3 border border-[#7bd0ff] shadow-[inset_0_0_10px_rgba(123,208,255,0.5)]" href="#">
<span class="material-symbols-outlined">settings_input_component</span>
</a>
<a class="flex flex-col items-center justify-center text-[#7bd0ff]/40 p-3 hover:text-white transition-all" href="#">
<span class="material-symbols-outlined">layers</span>
</a>
<a class="flex flex-col items-center justify-center text-[#7bd0ff]/40 p-3 hover:text-white transition-all" href="#">
<span class="material-symbols-outlined">timeline</span>
</a>
</nav>
<!-- Navigation Drawer (Hidden initially, but defined for structure) -->
<aside class="fixed inset-y-0 left-0 z-[70] flex flex-col p-8 bg-black/95 backdrop-blur-2xl h-screen w-80 border-r-2 border-[#7bd0ff] shadow-[20px_0_60px_rgba(0,0,0,0.9)] transform -translate-x-full transition-transform duration-300">
<div class="text-[#7bd0ff] font-black border-b border-[#7bd0ff] mb-8 pb-4 text-xl">
            CORE_COMMAND
        </div>
<nav class="flex flex-col gap-2">
<div class="flex items-center gap-4 text-white bg-[#7bd0ff]/30 font-bold border-l-4 border-[#7bd0ff] p-4 font-mono text-lg cursor-pointer">
<span class="material-symbols-outlined">tune</span>
                PARAMETERS
            </div>
<div class="flex items-center gap-4 text-[#7bd0ff]/60 hover:text-[#7bd0ff] hover:bg-[#7bd0ff]/10 p-4 font-mono text-lg transition-colors cursor-pointer">
<span class="material-symbols-outlined">straighten</span>
                SCALE_SELECT
            </div>
<div class="flex items-center gap-4 text-[#7bd0ff]/60 hover:text-[#7bd0ff] hover:bg-[#7bd0ff]/10 p-4 font-mono text-lg transition-colors cursor-pointer">
<span class="material-symbols-outlined">terminal</span>
                SYSTEM_LOGS
            </div>
<div class="flex items-center gap-4 text-[#7bd0ff]/60 hover:text-[#7bd0ff] hover:bg-[#7bd0ff]/10 p-4 font-mono text-lg transition-colors cursor-pointer">
<span class="material-symbols-outlined">database</span>
                DATA_EXPORT
            </div>
<div class="flex items-center gap-4 text-[#7bd0ff]/60 hover:text-[#7bd0ff] hover:bg-[#7bd0ff]/10 p-4 font-mono text-lg transition-colors cursor-pointer">
<span class="material-symbols-outlined">rocket_launch</span>
                RUN_SIMULATION
            </div>
</nav>
</aside>
</body></html>
