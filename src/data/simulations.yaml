# Simulation catalog source-of-truth.
#
# Each top-level key is one simulation family shown in the UI.
#
# `metadata.summaryStats`
#   End-of-run summary cards.
#
# `metadata.liveStats`
#   Top-right live telemetry rows.
#   - `value` is the initial/fallback display value
#   - `unit` is appended by the app
#   - `live: true` means a CSV stream should provide updates
#   - `live_key` can override which CSV column should be used
#
# `parameters`
#   Config-overlay controls and parameter-space metadata.

planetary:
  label: Planetary
  icon: '🌍'
  placeholderImage: /assets/planet_example.png
  metadata:
    distinctSimulations: 384
    correctValues:
      impactor_mass: 0.12
      impactor_velocity: 14
      impactor_angle: 43
    summaryStats:
      - id: parameters
      - id: runtime
        value: 0:00
      - id: similarityScore
        value: 100/100
      - id: carbonBurnt
        value: '0.00'
        unit: kgCO2e
      - id: computeUsed
        value: '0.0'
        unit: smartphones
      - id: memoryUsed
        value: '0.0'
        unit: GB
    liveStats:
      - id: impactor_mass
        value: '0.10'
        unit: M⊕
        live: false
      - id: impactor_velocity
        value: '12.0'
        unit: km/s
        live: false
      - id: impactor_angle
        value: '45'
        unit: °
        live: false
      - id: time
        value: 0.0
        unit: hours
        live: true
      - id: temperature
        value: 0.0
        unit: K
        live: true
      - id: Earth mass
        value: 1.0
        unit: M⊕
        live: true
  parameters:
    impactor_mass:
      label: Impactor Mass
      unit: M⊕
      min: 0.01
      max: 10
      step: 0.01
      default: 0.1
    impactor_velocity:
      label: Impactor Velocity
      unit: km/s
      min: 1
      max: 50
      step: 0.5
      default: 12
    impactor_angle:
      label: Impactor Angle
      unit: °
      min: 0
      max: 90
      step: 1
      default: 45

